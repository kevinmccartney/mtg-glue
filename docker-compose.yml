services:
  etl:
    image: mtg-glue-etl:local
    # Fargate (x86) pulls linux/amd64; Apple Silicon defaults to arm64 without this.
    platform: linux/amd64
    build:
      context: .
      dockerfile: projects/etl/Dockerfile
    env_file:
      - .env
    stdin_open: false
    entrypoint: ["sh"]
    tty: false
    environment:
      - PYTHONUNBUFFERED=1
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
    volumes:
      - ./.data:/app/.data
      - ./.out:/app/.out
