version: "3"

dotenv: [".env"]

vars:
  BOOTSTRAP_DIR: projects/infra/bootstrap
  MTG_GLUE_DIR: projects/infra/mtg_glue
  DEBUGPY_PORT: "5678"

tasks:
  env:info:
    desc: Show the Poetry virtualenv path and Python location
    cmds:
      - poetry env info

  env:aws-export:
    desc: 'Export AWS SSO credentials — run as: eval "$(task env:aws-export)"'
    silent: true
    cmds:
      - aws configure export-credentials --profile default --format env

  etl:build:
    desc: Build the ETL Docker image
    cmds:
      - docker compose build etl

  etl:run:local:
    desc: Shell in the ETL Docker container (linux/amd64; slow on Apple Silicon)
    cmds:
      # -T avoids a TTY so logs stream immediately and nothing blocks on stdin.
      - docker compose run -T --rm etl

  "etl:run:headed":
    desc: Run full ETL sync on host with headed Playwright (projects/etl/run_headed_local.sh)
    cmds:
      - bash projects/etl/run_headed_local.sh {{.CLI_ARGS}}

  moxfield:import:
    desc: Convert EchoMTG export CSV to Moxfield import CSV (extra flags after --)
    cmds:
      - poetry run moxfield-import {{.CLI_ARGS}}

  moxfield:import:debug:
    desc: |
      Run moxfield-import under debugpy on 0.0.0.0:DEBUGPY_PORT (default 5678), wait for VS Code attach.
      Example: task moxfield:import:debug -- --input .data/echomtg-export.csv --output .out/moxfield-import.csv
    env:
      PYTHONPATH: projects
    cmds:
      - |
        poetry run python -m debugpy --listen 0.0.0.0:{{.DEBUGPY_PORT}} --wait-for-client \
          -m cli.echo_mtg_to_moxfield {{.CLI_ARGS}}

  etl:debug:
    desc: |
      Run echo-moxfield-etl under debugpy on 0.0.0.0:DEBUGPY_PORT (default 5678), wait for VS Code attach.
      Set env vars (ECHOMTG_*, MOXFIELD_*, etc.) before running.
    env:
      PYTHONPATH: projects
    cmds:
      - |
        poetry run python -m debugpy --listen 0.0.0.0:{{.DEBUGPY_PORT}} --wait-for-client \
          -m etl.echo_moxfield_etl {{.CLI_ARGS}}

  moxfield:import:help:
    desc: Show moxfield-import CLI options
    cmds:
      - poetry run moxfield-import --help

  infra:init:bootstrap:
    desc: Initialise the bootstrap Terraform workspace (local state)
    cmds:
      - terraform -chdir={{.BOOTSTRAP_DIR}} init

  infra:plan:bootstrap:
    desc: Plan the bootstrap workspace (reads TF_STATE_BUCKET and AWS_REGION from .env)
    vars:
      REGION: '{{.AWS_REGION | default "us-east-1"}}'
    cmds:
      - terraform -chdir={{.BOOTSTRAP_DIR}} plan
        -var="state_bucket_name={{.TF_STATE_BUCKET}}"
        -var="aws_region={{.REGION}}"

  infra:apply:bootstrap:
    desc: Apply the bootstrap workspace (reads TF_STATE_BUCKET and AWS_REGION from .env)
    vars:
      REGION: '{{.AWS_REGION | default "us-east-1"}}'
    cmds:
      - terraform -chdir={{.BOOTSTRAP_DIR}} apply
        -var="state_bucket_name={{.TF_STATE_BUCKET}}"
        -var="aws_region={{.REGION}}"
        -auto-approve

  infra:init:mtg-glue:
    desc: Initialise the mtg_glue workspace with the remote S3 backend (reads TF_STATE_BUCKET and AWS_REGION from .env)
    vars:
      REGION: '{{.AWS_REGION | default "us-east-1"}}'
    cmds:
      - terraform -chdir={{.MTG_GLUE_DIR}} init
        -backend-config="bucket={{.TF_STATE_BUCKET}}"
        -backend-config="region={{.REGION}}"
        -backend-config="dynamodb_table=terraform-state-locks"

  infra:plan:mtg-glue:
    desc: Plan the mtg_glue workspace (reads email and region from .env)
    vars:
      REGION: '{{.AWS_REGION | default "us-east-1"}}'
    cmds:
      - terraform -chdir={{.MTG_GLUE_DIR}} plan
        -var="aws_region={{.REGION}}"
        -var="notification_sender_email={{.NOTIFICATION_SENDER_EMAIL}}"
        -var="notification_recipient_email={{.NOTIFICATION_RECIPIENT_EMAIL}}"

  infra:apply:mtg-glue:
    desc: Apply the mtg_glue workspace (reads email and region from .env)
    vars:
      REGION: '{{.AWS_REGION | default "us-east-1"}}'
    cmds:
      - terraform -chdir={{.MTG_GLUE_DIR}} apply
        -var="aws_region={{.REGION}}"
        -var="notification_sender_email={{.NOTIFICATION_SENDER_EMAIL}}"
        -var="notification_recipient_email={{.NOTIFICATION_RECIPIENT_EMAIL}}"
        -auto-approve

  infra:validate:mtg-glue:
    desc: Validate mtg_glue Terraform (no remote state required)
    cmds:
      - terraform -chdir={{.MTG_GLUE_DIR}} init -backend=false -input=false
      - terraform -chdir={{.MTG_GLUE_DIR}} validate

  etl:upload-config:
    desc: Upload ./config.yaml to s3://<bucket>/config/config.yaml (Terraform bucket_name + AWS creds)
    cmds:
      - |
        set -e
        test -f config.yaml || { echo "config.yaml not found (repo root)"; exit 1; }
        BUCKET="$(terraform -chdir={{.MTG_GLUE_DIR}} output -raw bucket_name)"
        aws s3 cp config.yaml "s3://${BUCKET}/config/config.yaml"
        echo "Uploaded s3://${BUCKET}/config/config.yaml"

  etl:push-ecr:
    desc: Build local image, tag :latest, push to ECR (task infra:apply:mtg-glue first)
    vars:
      REGION: '{{.AWS_REGION | default "us-east-1"}}'
    cmds:
      - docker compose build etl
      - |
        set -e
        REPO="$(terraform -chdir={{.MTG_GLUE_DIR}} output -raw etl_ecr_repository_url)"
        REGISTRY="${REPO%%/*}"
        aws ecr get-login-password --region "{{.REGION}}" | docker login --username AWS --password-stdin "$REGISTRY"
        docker tag mtg-glue-etl:local "${REPO}:latest"
        docker push "${REPO}:latest"

  "etl:run:fargate":
    desc: Start one-off ETL task on ECS Fargate (terraform etl_manual_run_cli_example piped to sh)
    cmds:
      - bash -ec 'set -o pipefail; terraform -chdir={{.MTG_GLUE_DIR}} output -raw etl_manual_run_cli_example | sh'
